<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sorteo | Padeluminatis Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/eventos.css">
    <link rel="stylesheet" href="./css/evento-sorteo.css">
</head>
<body>
    <div class="sport-bg"></div>

    <main class="page-content draw-page">
        <!-- Header con título y botón de amaño -->
        <div class="draw-header">
            <h1 class="page-title-pro"><i class="fas fa-dice"></i> Sorteo del Evento</h1>
            <button id="btn-rigging" class="btn-rigging hidden"><i class="fas fa-wrench"></i> Amañar</button>
        </div>

        <!-- Mensaje de sorteo ya realizado -->
        <div id="draw-message" class="draw-message hidden">
            <i class="fas fa-check-circle"></i> El sorteo ya fue realizado. No puedes volver a verlo.
        </div>

        <!-- Animación principal -->
        <div id="cardContainer" class="card-container">
            <div id="card" class="card">
                <div class="card-inner">
                    <div class="card-front">
                        <img src="./imagenes/Logojafs.png" alt="Padeluminatis Logo" class="card-logo">
                    </div>
                    <div class="card-back">
                        <span id="playerNameDisplay" class="player-name"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Controles -->
        <div class="draw-controls">
            <button id="btn-start-draw" class="btn-draw-primary">Iniciar Sorteo</button>
            <button id="btn-next-step" class="btn-draw-primary" disabled>Siguiente</button>
        </div>

        <!-- Grupos (se llenan con JS) -->
        <div id="groups-container" class="groups-container"></div>

    </main>

    <!-- MODAL: AMAÑAR SORTEO (solo admin) -->
    <div id="modal-rigging" class="modal-overlay">
        <button id="btn-load-preset" class="btn btn-secondary w-full mt-2"><i class="fas fa-download"></i> Cargar configuración primer torneo</button>
        <div class="modal-card glass-strong slide-up" style="max-width: 500px;">
            <div class="modal-header">
                <h3 class="modal-title">Amañar sorteo</h3>
                <button class="close-btn" onclick="document.getElementById('modal-rigging').classList.remove('active')">×</button>
            </div>
            <div class="modal-body p-4">
                <div class="form-group">
                    <label class="form-label">Jugador 1</label>
                    <select id="rig-player1" class="input"></select>
                </div>
                <div class="form-group">
                    <label class="form-label">Jugador 2</label>
                    <select id="rig-player2" class="input"></select>
                </div>
                <div class="form-group">
                    <label class="form-label">Grupo (opcional)</label>
                    <select id="rig-group" class="input">
                        <option value="">Aleatorio</option>
                        <option value="A">Grupo A</option>
                        <option value="B">Grupo B</option>
                        <option value="C">Grupo C</option>
                        <option value="D">Grupo D</option>
                    </select>
                </div>
                <button id="btn-add-rigged-pair" class="btn btn-primary w-full">Añadir pareja fija</button>
                <hr class="my-3">
                <div class="flex-col gap-2">
                    <h4 class="text-[12px] font-bold">Parejas fijas:</h4>
                    <ul id="rigged-pairs-list" class="rigged-list"></ul>
                </div>
                <button id="btn-clear-rigged" class="btn btn-ghost w-full mt-2">Limpiar todas</button>
            </div>
        </div>
    </div>

    <script type="module" src="./js/evento-sorteo.js"></script>
</body>
</html>
