<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#020617">
    <title>Mi ELO | JafsPadel</title>
    <meta name="description" content="Tu puntuacion ELO detallada">
    <link rel="icon" type="image/x-icon" href="./imagenes/Logojafs.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Rajdhani:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/mi-elo.css">
</head>

<body>
    <div class="sport-bg"></div>
    <main class="page-content elo-page">
        <header class="elo-header animate-up">
            <div class="flex-col">
                <h1 class="page-title-pro"><i class="fas fa-chart-line"></i> Mi ELO</h1>
                <p class="page-sub-pro">Desglose por partido · Historial</p>
            </div>
        </header>

        <section class="elo-summary-card animate-up" style="animation-delay:0.05s;">
            <div class="elo-big-number">
                <span id="elo-current" class="elo-big-val">1000</span>
                <span class="elo-big-label">ELO ACTUAL</span>
            </div>
            <div class="elo-summary-stats">
                <div class="elo-ss">
                    <span class="elo-ss-val" id="elo-nivel">2.50</span>
                    <span class="elo-ss-lbl">NIVEL</span>
                </div>
                <div class="elo-ss">
                    <span class="elo-ss-val" id="elo-rank">#--</span>
                    <span class="elo-ss-lbl">RANKING</span>
                </div>
                <div class="elo-ss">
                    <span class="elo-ss-val" id="elo-played">0</span>
                    <span class="elo-ss-lbl">JUGADOS</span>
                </div>
                <div class="elo-ss">
                    <span class="elo-ss-val" id="elo-winrate">0%</span>
                    <span class="elo-ss-lbl">WINRATE</span>
                </div>
            </div>

            <div class="elo-level-progress">
                <div class="elo-lp-head">
                    <span id="elo-div-name" class="elo-div-badge">BRONCE</span>
                    <span id="elo-lp-pts" class="elo-lp-detail">-- pts para subir</span>
                </div>
                <div class="elo-lp-bar">
                    <div id="elo-lp-fill" class="elo-lp-fill" style="width:50%;"></div>
                </div>
                <div class="elo-lp-labels">
                    <span id="elo-lp-min">0</span>
                    <span id="elo-lp-max">300</span>
                </div>
            </div>
        </section>

        <section class="elo-breakdown-section animate-up" style="animation-delay:0.1s;">
            <div class="elo-section-head">
                <span class="elo-section-title"><i class="fas fa-list-ol"></i> Desglose por Partido</span>
            </div>
            <div id="elo-breakdown-list" class="elo-breakdown-list">
                <div class="elo-loading">
                    <div class="hv2-skeleton-row"></div>
                    <div class="hv2-skeleton-row"></div>
                    <div class="hv2-skeleton-row"></div>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="./js/mi-elo.js"></script>
    <script type="module">
        import { initGalaxyBackground } from './js/modules/galaxy-bg.js';
        initGalaxyBackground();
    </script>
</body>

</html>
