<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#08111d">
  <title>Sin conexion | JafsPadel</title>
  <link rel="icon" type="image/png" href="./imagenes/Logojafs.png">
  <style>
    :root {
      color-scheme: dark;
      --bg: #08111d;
      --panel: rgba(7, 18, 33, 0.82);
      --border: rgba(255, 255, 255, 0.12);
      --accent: #7fffd4;
      --text: #eff6ff;
      --muted: rgba(226, 232, 240, 0.72);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(circle at top, rgba(76, 201, 240, 0.16), transparent 38%),
        radial-gradient(circle at bottom right, rgba(127, 255, 212, 0.14), transparent 32%),
        var(--bg);
      color: var(--text);
    }
    .offline-card {
      width: min(100%, 420px);
      padding: 28px;
      border-radius: 28px;
      border: 1px solid var(--border);
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.34);
      text-align: center;
    }
    img {
      width: 84px;
      height: 84px;
      object-fit: contain;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 1.8rem;
    }
    p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.5;
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), #4cc9f0);
      color: #04111d;
    }
  </style>
</head>
<body>
  <main class="offline-card">
    <img src="./imagenes/Logojafs.png" alt="JafsPadel">
    <h1>Estas sin conexion</h1>
    <p>La aplicacion seguira mostrando lo que tenga en cache. Cuando vuelva internet, tus datos se sincronizaran automaticamente.</p>
    <button type="button" onclick="window.location.reload()">Reintentar</button>
  </main>
</body>
</html>
