<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#020617">
    <title>Historial | JafsPadel</title>
    <meta name="description" content="Tu historial de partidos de padel">
    <link rel="icon" type="image/x-icon" href="./imagenes/Logojafs.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Rajdhani:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/historial.css">
</head>

<body>
    <div class="sport-bg"></div>

    <main class="page-content history-page">
        <section class="page-header animate-fade-in">
            <div class="page-title-row">
                <div>
                    <h1 class="page-title-pro">Historial</h1>
                    <span class="page-sub-pro">Resultados, rivales y evolucion reciente</span>
                </div>
                <div class="header-badge">
                    <i class="fas fa-clock-rotate-left"></i>
                </div>
            </div>
        </section>

        <section class="stats-grid animate-fade-in" style="animation-delay: 0.1s;">
            <div class="stat-card-mini primary">
                <div class="stat-icon"><i class="fas fa-gamepad"></i></div>
                <span class="stat-value-mini" id="st-played">-</span>
                <span class="stat-label-mini">Partidos</span>
            </div>
            <div class="stat-card-mini success">
                <div class="stat-icon"><i class="fas fa-trophy"></i></div>
                <span class="stat-value-mini" id="st-wins">-</span>
                <span class="stat-label-mini">Victorias</span>
            </div>
            <div class="stat-card-mini accent">
                <div class="stat-icon"><i class="fas fa-percent"></i></div>
                <span class="stat-value-mini" id="st-wr">-</span>
                <span class="stat-label-mini">Winrate</span>
            </div>
        </section>

        <section class="filter-section animate-fade-in" style="animation-delay: 0.15s;">
            <div class="filter-row mb-4">
                <div class="filter-tabs custom-scroll" role="tablist" aria-label="Filtros de historial">
                    <button class="filter-tab active" data-filter="mine" role="tab" aria-selected="true">Mis partidos</button>
                    <button class="filter-tab" data-filter="all" role="tab" aria-selected="false">Global</button>
                    <button class="filter-tab" data-filter="won" role="tab" aria-selected="false">Victorias</button>
                    <button class="filter-tab" data-filter="lost" role="tab" aria-selected="false">Derrotas</button>
                    <button class="filter-tab" data-filter="canceled" role="tab" aria-selected="false">Anuladas</button>
                </div>
            </div>

            <div class="flex-row gap-4 items-center mb-6">
                <div class="search-box-v7 flex-1">
                    <i class="fas fa-search"></i>
                    <input type="text" id="user-search" placeholder="Filtrar por jugador..."
                        class="bg-transparent border-none text-white text-sm outline-none w-full font-bold" aria-label="Buscar jugador en historial">
                </div>
                <div class="sort-dropdown">
                    <select id="sort-matches" class="premium-select-v7" aria-label="Ordenar historial">
                        <option value="date-desc">Mas recientes</option>
                        <option value="date-asc">Mas antiguos</option>
                        <option value="name-asc">Rival (A-Z)</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="history-section animate-fade-in" style="animation-delay: 0.2s;">
            <div id="history-container" class="history-list">
                <div class="history-item skeleton-item">
                    <div class="skeleton w-12 h-12 rounded-lg"></div>
                    <div class="flex-col gap-2 flex-1">
                        <div class="skeleton h-4 w-24"></div>
                        <div class="skeleton h-3 w-16"></div>
                    </div>
                </div>
                <div class="history-item skeleton-item">
                    <div class="skeleton w-12 h-12 rounded-lg"></div>
                    <div class="flex-col gap-2 flex-1">
                        <div class="skeleton h-4 w-24"></div>
                        <div class="skeleton h-3 w-16"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="modal-match-detail" class="modal-overlay bottom-sheet" role="dialog" aria-modal="true" aria-label="Detalle del partido">
        <div class="modal-sheet" id="match-detail-content"></div>
    </div>

    <script type="module" src="./js/historial.js"></script>
    <script type="module">
        import { initGalaxyBackground } from './js/modules/galaxy-bg.js';
        import { initThemeSystem } from './js/modules/theme-manager.js';
        initThemeSystem();
        initGalaxyBackground();
    </script>
</body>

</html>
