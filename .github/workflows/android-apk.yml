name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
  release:
    types:
      - published

jobs:
  build-apk:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile-capacitor/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        working-directory: mobile-capacitor
        run: npm ci

      - name: Sync web assets with Android
        working-directory: mobile-capacitor
        run: npm run cap:sync

      - name: Build release APK
        working-directory: mobile-capacitor/android
        run: .\gradlew.bat assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jafs-padelclub-release-apk
          path: mobile-capacitor/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Attach APK to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: mobile-capacitor/android/app/build/outputs/apk/release/app-release.apk

