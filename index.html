<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>PADELUMINATIS · Actualización</title>
  <!-- Fuente Rajdhani (estilo profesional) + respaldo sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════════════
       GLOBAL RESET & VARIABLES (tema galactic · sobrio)
       ═══════════════════════════════════════════════════════════ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-void: #0a1426;
      --bg-surface: rgba(14, 22, 38, 0.85);
      --primary: #cfff3a;        /* Luminous lime suave */
      --primary-glow: rgba(198, 255, 58, 0.25);
      --secondary: #00e5ff;       /* Cyan tenue */
      --accent: #ff80ff;           /* Magenta pastel (menos agresivo) */
      --text-primary: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.7);
      --card-radius: 24px;
      --page-shell-x: clamp(16px, 5vw, 32px);
      --transition-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      background-color: var(--bg-void);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    /* ─────────────────────────────────────
       FONDO DE GALAXIA (solo CSS · estrellas animadas)
       ───────────────────────────────────── */
    .galaxy-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: radial-gradient(ellipse at 40% 50%, #1d2b5a 0%, #0f1a36 45%, #0a1226 100%);
    }

    .galaxy-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: 
        radial-gradient(1.5px 1.5px at 15px 28px, #fff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 72px 13px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 110px 220px, #fff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 200px 70px, #fff, rgba(0,0,0,0)),
        radial-gradient(2.5px 2.5px at 310px 180px, #fff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 420px 350px, #fff, rgba(0,0,0,0)),
        radial-gradient(1.8px 1.8px at 550px 90px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 680px 420px, #fff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 750px 280px, #fff, rgba(0,0,0,0)),
        radial-gradient(1.2px 1.2px at 820px 500px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 900px 150px, #fff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 1000px 610px, #fff, rgba(0,0,0,0)),
        radial-gradient(1.5px 1.5px at 150px 600px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 320px 750px, #fff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 480px 820px, #fff, rgba(0,0,0,0)),
        radial-gradient(1.8px 1.8px at 590px 940px, #fff, rgba(0,0,0,0)),
        radial-gradient(2.2px 2.2px at 720px 780px, #fff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 880px 890px, #fff, rgba(0,0,0,0));
      background-repeat: repeat;
      background-size: 1100px 1100px;
      opacity: 0.4;
      animation: driftStars 160s linear infinite;
      pointer-events: none;
    }

    @keyframes driftStars {
      0% { transform: translateY(0) translateX(0); }
      100% { transform: translateY(-600px) translateX(100px); }
    }

    /* Capa de neblina sutil para dar profundidad */
    .galaxy-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 70% 30%, rgba(100, 150, 255, 0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    /* ─────────────────────────────────────
       CONTENEDOR PRINCIPAL (totalmente responsive)
       ───────────────────────────────────── */
    .content {
      width: 100%;
      max-width: 720px;
      padding: var(--page-shell-x);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* TARJETA GLASSMORPHISM (sobria, con destellos neón suaves) */
    .card {
      width: 100%;
      background: var(--bg-surface);
      backdrop-filter: blur(12px) saturate(120%);
      -webkit-backdrop-filter: blur(12px) saturate(120%);
      border-radius: var(--card-radius);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 
        0 30px 60px rgba(0, 0, 0, 0.6),
        0 0 0 1px rgba(255, 255, 255, 0.02) inset,
        0 0 40px rgba(0, 230, 255, 0.1);
      padding: clamp(2rem, 8vw, 3.5rem) clamp(1.5rem, 6vw, 3rem);
      text-align: center;
      animation: float 7s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    /* TÍTULO PRINCIPAL con estilo neón tenue (galactic) */
    h1 {
      font-size: clamp(2.4rem, 12vw, 4.2rem);
      font-weight: 900;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--primary);
      text-shadow: 
        0 0 15px var(--primary-glow),
        0 0 30px rgba(0, 229, 255, 0.3);
      margin-bottom: 1.2rem;
      line-height: 1.1;
      word-break: break-word;
    }

    /* Subtítulo o mensaje principal */
    .main-message {
      font-size: clamp(1.2rem, 5vw, 1.8rem);
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .main-message strong {
      color: var(--secondary);
      font-weight: 700;
      text-shadow: 0 0 12px rgba(0, 229, 255, 0.5);
    }

    .main-message span {
      display: inline-block;
    }

    /* Bloque de texto secundario */
    .sub-message {
      font-size: clamp(1rem, 4vw, 1.3rem);
      font-weight: 500;
      color: rgba(255, 255, 255, 0.6);
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 60px;
      padding: 0.8rem 1.8rem;
      display: inline-block;
      backdrop-filter: blur(4px);
      margin-top: 1rem;
      letter-spacing: 0.5px;
    }

    .sub-message i {
      color: var(--accent);
      font-style: normal;
      font-weight: 600;
      margin: 0 4px;
    }

    /* Pequeño detalle animado (estrellas inline) */
    .spark {
      display: inline-block;
      animation: sparkle 3s infinite;
    }

    @keyframes sparkle {
      0% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 6px var(--accent)); }
      100% { opacity: 0.6; transform: scale(1); }
    }

    /* Línea divisoria decorativa muy sutil */
    .divider {
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary), var(--secondary), transparent);
      margin: 2rem auto 1.5rem;
      opacity: 0.4;
    }

    /* Ajustes para pantallas muy pequeñas */
    @media (max-width: 380px) {
      h1 {
        letter-spacing: 3px;
      }
      .card {
        padding: 2rem 1.2rem;
      }
    }

    /* scroll suave y personalizado */
    html {
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    * {
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
    }
    *::-webkit-scrollbar {
      width: 4px;
    }
    *::-webkit-scrollbar-track {
      background: transparent;
    }
    *::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
    }
  </style>
</head>
<body>
  <!-- Fondo galáctico animado (CSS puro) -->
  <div class="galaxy-bg" aria-hidden="true"></div>

  <main class="content">
    <div class="card">
      <h1>PADELUMINATIS</h1>

      <div class="main-message">
        <span>⚡</span> <strong>Actualmente</strong> la página no está disponible <span>⚡</span>
      </div>

      <div class="main-message" style="font-size: clamp(1.1rem, 4.5vw, 1.6rem); margin-bottom: 1rem;">
        Estamos realizando una <strong>nueva actualización</strong> para brillar aún más.
      </div>

      <div class="divider"></div>

      <div class="sub-message">
        <span class="spark">✨</span> Vuelve más tarde, la galaxia te espera <span class="spark">✨</span>
      </div>
    </div>
  </main>
</body>
</html>
