<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Detalle del evento | JafsPadel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/evento-detalle.css">
</head>

<body>
    <div class="sport-bg"></div>

    <main class="page-content event-detail-page" id="eventDetailPage">
        <!-- Hero Section -->
        <section class="ed-hero">
            <div class="ed-hero-bg" id="ed-hero-bg"></div>
            <div class="ed-hero-content" id="ed-hero-content">
                <!-- Se llena con JS -->
            </div>
        </section>

        <!-- Stats Strip -->
        <div class="ed-stats-strip" id="ed-stats-strip"></div>

        <!-- Action Bar (inscripción) -->
        <div id="ed-action-bar" class="ed-action-bar hidden">
            <div class="ed-action-content" id="ed-action-content"></div>
        </div>

        <!-- Tabs -->
        <div class="ed-tabs">
            <button class="ed-tab active" data-tab="info"><i class="fas fa-info-circle"></i> Info</button>
            <button class="ed-tab" data-tab="participantes"><i class="fas fa-users"></i> Participantes</button>
            <button class="ed-tab" data-tab="clasificacion"><i class="fas fa-table-list"></i> Clasificación</button>
            <button class="ed-tab" data-tab="partidos"><i class="fas fa-calendar-check"></i> Partidos</button>
            <button class="ed-tab" data-tab="bracket"><i class="fas fa-sitemap"></i> Bracket</button>
            <button id="organizador-tab" class="ed-tab" data-tab="organizador" style="display: none;"><i
                    class="fas fa-crown"></i> Organizador</button>
        </div>

        <!-- Panels -->
        <div id="pane-info" class="ed-pane active"></div>
        <div id="pane-participantes" class="ed-pane hidden"></div>
        <div id="pane-clasificacion" class="ed-pane hidden"></div>
        <div id="pane-partidos" class="ed-pane hidden"></div>
        <div id="pane-bracket" class="ed-pane hidden"></div>
        <div id="pane-organizador" class="ed-pane hidden"></div>

    </main>

    <!-- MODAL: DETALLE DE PARTIDO -->
    <div id="modal-match-detail-ed" class="modal-overlay">
        <!-- Contenido dinámico inyectado por JS -->
    </div>

    <!-- MODAL: AÑADIR JUGADOR (desde organizador) -->

    <div id="modal-add-player-detalle" class="modal-overlay">
        <div class="modal-card glass-strong slide-up" style="max-width: 500px;">
            <div class="modal-header">
                <h3 class="modal-title">Añadir jugador</h3>
                <button class="close-btn"
                    onclick="document.getElementById('modal-add-player-detalle').classList.remove('active')">×</button>
            </div>
            <div class="modal-body p-4">
                <div class="form-group">
                    <label class="form-label">Tipo</label>
                    <select id="add-player-type-detalle" class="input">
                        <option value="registered">Registrado</option>
                        <option value="guest">Invitado</option>
                    </select>
                </div>
                <div id="registered-player-select-detalle" class="form-group">
                    <label class="form-label">Seleccionar usuario</label>
                    <select id="select-registered-user-detalle" class="input"></select>
                </div>
                <div id="guest-player-input-detalle" class="form-group hidden">
                    <label class="form-label">Nombre invitado</label>
                    <input type="text" id="guest-name-detalle" class="input">
                </div>
                <div class="form-group">
                    <label class="form-label">Preferencia</label>
                    <select id="player-preference-detalle" class="input">
                        <option value="izquierda">Izquierda</option>
                        <option value="derecha">Derecha</option>
                        <option value="indiferente">Indiferente</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Código de pareja</label>
                    <input type="text" id="player-pair-code-detalle" class="input">
                </div>
                <div class="form-group">
                    <label class="form-label">Nivel</label>
                    <input type="number" id="player-level-detalle" class="input" step="0.5" min="1" max="7" value="2.5">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost"
                    onclick="document.getElementById('modal-add-player-detalle').classList.remove('active')">Cancelar</button>
                <button id="btn-confirm-add-player-detalle" class="btn btn-primary">Añadir</button>
            </div>
        </div>
    </div>

    <script type="module" src="./js/evento-detalle.js"></script>
    <script type="module">
        import { initVecinaChat } from './js/modules/vecina-chat.js';
        try { initVecinaChat(); } catch (e) { console.warn('Vecina chat init failed', e); }
    </script>
</body>

</html>
