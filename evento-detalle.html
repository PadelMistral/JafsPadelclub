<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detalle del Evento | Padeluminatis</title>
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/evento-detalle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="sport-bg"></div>
    <main class="page-content">
        <div id="header-placeholder"></div>

        <!-- Botón flotante para volver a eventos -->
        <a href="eventos.html" class="btn-back-to-events" title="Volver a eventos">
            <i class="fas fa-arrow-left"></i>
        </a>

        <div class="ed-hero" id="ed-hero">
            <div class="ed-hero-content" id="ed-hero-content"></div>
        </div>

        <div class="ed-stats-strip" id="ed-stats-strip"></div>

        <div class="ed-tabs">
            <button class="ed-tab active" data-tab="info"><i class="fas fa-info-circle"></i> Info</button>
            <button class="ed-tab" data-tab="clasificacion"><i class="fas fa-table"></i> Clasificación</button>
            <button class="ed-tab" data-tab="partidos"><i class="fas fa-calendar-alt"></i> Partidos</button>
            <button class="ed-tab" data-tab="bracket"><i class="fas fa-sitemap"></i> Bracket</button>
            <button class="ed-tab" data-tab="organizador" id="organizador-tab" style="display:none;"><i class="fas fa-crown"></i> Organizador</button>
        </div>

        <div id="pane-info" class="ed-pane active"></div>
        <div id="pane-clasificacion" class="ed-pane hidden"></div>
        <div id="pane-partidos" class="ed-pane hidden"></div>
        <div id="pane-bracket" class="ed-pane hidden"></div>
        <div id="pane-organizador" class="ed-pane hidden"></div>

        <div id="ed-action-bar" class="ed-action-bar hidden">
            <div id="ed-action-content"></div>
        </div>
    </main>

    <!-- MODAL: AÑADIR JUGADOR (desde organizador) -->
    <div id="modal-add-player-detalle" class="modal-overlay">
        <div class="modal-card glass-strong slide-up" style="max-width: 500px;">
            <div class="modal-header">
                <h3 class="modal-title">Añadir jugador al evento</h3>
                <button class="close-btn" onclick="document.getElementById('modal-add-player-detalle').classList.remove('active')">×</button>
            </div>
            <div class="modal-body p-4">
                <div class="form-group">
                    <label class="form-label">Tipo de jugador</label>
                    <select id="add-player-type-detalle" class="input">
                        <option value="registered">Registrado</option>
                        <option value="guest">Invitado</option>
                    </select>
                </div>
                <div id="registered-player-select-detalle" class="form-group">
                    <label class="form-label">Seleccionar usuario registrado</label>
                    <select id="select-registered-user-detalle" class="input">
                        <option value="">Cargando...</option>
                    </select>
                </div>
                <div id="guest-player-input-detalle" class="form-group hidden">
                    <label class="form-label">Nombre del invitado</label>
                    <input type="text" id="guest-name-detalle" class="input" placeholder="Ej: Juan Pérez">
                </div>
                <div class="form-group">
                    <label class="form-label">Preferencia de lado</label>
                    <select id="player-preference-detalle" class="input">
                        <option value="izquierda">Izquierda</option>
                        <option value="derecha">Derecha</option>
                        <option value="indiferente">Me da igual</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Nivel (solo para invitados, opcional)</label>
                    <input type="number" id="player-level-detalle" class="input" value="2.5" min="1.0" max="7.0" step="0.5">
                </div>
                <div class="form-group">
                    <label class="form-label">Código de pareja (si es obligatorio)</label>
                    <input type="text" id="player-pair-code-detalle" class="input" placeholder="Ej: pareja1">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="document.getElementById('modal-add-player-detalle').classList.remove('active')">Cancelar</button>
                <button id="btn-confirm-add-player-detalle" class="btn btn-primary">Añadir</button>
            </div>
        </div>
    </div>

    <script type="module" src="./js/evento-detalle.js"></script>
</body>
</html>
